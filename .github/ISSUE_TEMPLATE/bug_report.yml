name: Bug Report
description: Create a report to help us improve AwapiPDF
title: "[Bug] "
labels: ["bug"]
assignees: []

body:
  - type: markdown
    attributes:
      value: >
        Thanks for taking the time to report an issue! Please ensure it's a bug with the current version and not a feature request.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
      placeholder: What happened or what didn't happen?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Provide clear steps to reproduce the issue.
      placeholder: |
        1. Go to '...'
        2. Click on '....'
        3. Scroll down to '....'
        4. See error
    validations:
      required: true
      
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: A clear and concise description of what you expected to happen.
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating System
      description: e.g., macOS Ventura, Windows 11, Ubuntu 22.04
      placeholder: macOS 14.0
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: App Version
      description: Which version of AwapiPDF are you using?
      placeholder: v0.1.0 (or commit hash)
    validations:
      required: true
      
  - type: textarea
    id: logs
    attributes:
      label: Logs / Screenshots
      description: |
        If applicable, add screenshots or console output to help explain your problem. 
        You can open developer tools to see console logs in the app.
