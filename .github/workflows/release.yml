name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build & Release (${{ matrix.label }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Windows
            runner: windows-latest
            # Produces .msi and .exe (NSIS) installers
          - label: macOS (Apple Silicon)
            runner: macos-latest
            args: --target aarch64-apple-darwin
          - label: macOS (Intel)
            runner: macos-latest
            args: --target x86_64-apple-darwin
          - label: Linux
            runner: ubuntu-22.04
            # Produces .deb and .AppImage

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm

      - run: npm ci

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.label == 'macOS (Intel)' && 'x86_64-apple-darwin' || '' }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "AwapiPDF ${{ github.ref_name }}"
          releaseBody: |
            See the full changelog in [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md).

            ## Downloads
            | Platform | File |
            |----------|------|
            | Windows  | `.msi` or `.exe` |
            | macOS    | `.dmg` |
            | Linux    | `.AppImage` or `.deb` |
          releaseDraft: ${{ endsWith(github.ref_name, '-draft') }}
          prerelease: false
          args: ${{ matrix.args }}
