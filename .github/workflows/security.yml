name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run a full scan every Monday at 06:00 UTC to catch newly published advisories
    - cron: '0 6 * * 1'

permissions:
  contents: read

jobs:
  # ── 1. npm audit ────────────────────────────────────────────────────────────
  npm-audit:
    name: npm audit (frontend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - run: npm ci

      # Fail on moderate or higher severity (critical, high, moderate)
      - name: Audit npm dependencies
        run: npm audit --audit-level=moderate

  # ── 2. cargo audit ──────────────────────────────────────────────────────────
  cargo-audit:
    name: cargo audit (Rust)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      # Checks Cargo.lock against the RustSec Advisory Database
      - name: Audit Cargo dependencies
        working-directory: src-tauri
        run: cargo audit

  # ── 3. CodeQL (SAST for TypeScript/JavaScript) ──────────────────────────────
  codeql:
    name: CodeQL analysis (TypeScript)
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write   # required to upload SARIF results
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          # Use the security-extended query suite for broader coverage
          queries: security-extended

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - run: npm ci

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: typescript

  # ── 4. Dependency Review (PRs only) ─────────────────────────────────────────
  dependency-review:
    name: Dependency review
    runs-on: ubuntu-latest
    # Only meaningful on pull_request — compares base vs head dependency graph
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write   # allows posting a comment summarising findings
    steps:
      - uses: actions/checkout@v4

      - name: Dependency review
        uses: actions/dependency-review-action@v4
        with:
          # Fail if any new dependency has a known vulnerability of moderate or higher
          fail-on-severity: moderate
          # Post a summary comment on the PR
          comment-summary-in-pr: always
